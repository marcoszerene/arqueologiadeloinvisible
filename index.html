<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Arqueología Visual - Individual - FAD UNCuyo</title>
    
    <!-- Dependencias -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Inter:wght@300;400;700;900&display=swap');
        
        :root {
            --cono-red: #b01e23;
            --cono-pink-light: #fcf5f3;
            --cono-pink-mid: #eeb8ac;
            --cono-purple: #831843;
            --cono-text: #374151;
            --semaforo-verde: #22c55e;
            --semaforo-amarillo: #eab308;
            --semaforo-rojo: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9d8cf;
            color: var(--cono-text);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; margin: 0; }
            .report-container { 
                box-shadow: none !important; 
                border: 2px solid #000 !important;
                border-radius: 0 !important;
                width: 100%;
                min-height: 297mm;
                padding: 15mm !important;
                margin: 0;
            }
            .chart-container { height: 350px !important; }
            textarea { border: none !important; background: transparent !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--cono-pink-mid); border-radius: 10px; }

        .auto-expand {
            overflow: hidden;
            resize: none;
            min-height: 90px;
        }

        .bg-verde-semaforo { background-color: var(--semaforo-verde); }
        .bg-amarillo-semaforo { background-color: var(--semaforo-amarillo); }
        .bg-rojo-semaforo { background-color: var(--semaforo-rojo); }

        .pedagogic-box {
            border-left: 4px solid var(--cono-red);
            background: linear-gradient(to right, #fcf5f3, white);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, 
            ResponsiveContainer, Legend 
        } = window.Recharts;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block align-text-bottom ${className}`}></i>;
        };

        const AutoExpandingTextarea = ({ value, onChange, placeholder, className, label, icon }) => {
            const textareaRef = useRef(null);
            const adjustHeight = () => {
                const textarea = textareaRef.current;
                if (textarea) {
                    textarea.style.height = "auto";
                    textarea.style.height = `${textarea.scrollHeight}px`;
                }
            };
            useEffect(() => { adjustHeight(); }, [value]);

            return (
                <div className="space-y-3">
                    <h4 className={`flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-white bg-[#b01e23] px-4 py-1.5 rounded-full w-fit shadow-sm`}>
                        <Icon name={icon} size={12} /> {label}
                    </h4>
                    <textarea 
                        ref={textareaRef}
                        className={`w-full bg-[#fcf5f3] border-none p-4 rounded-2xl text-[13px] font-medium leading-relaxed outline-none focus:ring-2 focus:ring-[#b01e23] focus:ring-opacity-20 transition-all auto-expand ${className}`}
                        placeholder={placeholder}
                        value={value}
                        onChange={(e) => {
                            onChange(e.target.value);
                            adjustHeight();
                        }}
                    />
                </div>
            );
        };

        const App = () => {
            const [layers, setLayers] = useState([
                { id: 1, name: 'Registro 01', scores: [1, 1, 1, 1, 1], visible: true, color: '#b01e23' },
                { id: 2, name: 'Registro 02', scores: [1, 1, 1, 1, 1], visible: true, color: '#831843' },
            ]);
            
            const [metadata, setMetadata] = useState({
                autor: '',
                zona: '',
                categoria: 'MERCADO',
                insight: '',
                hmw: '',
                prospectiva: ''
            });

            const categorias = [
                { id: 'MERCADO', label: 'Mercado', icon: 'shopping-cart' },
                { id: 'SOCIAL', label: 'Social', icon: 'users' },
                { id: 'CULTURAL', label: 'Cultural', icon: 'landmark' }
            ];

            const variables = [
                { 
                    subject: 'Sintonía', 
                    painLabel: 'Físico-Espacial',
                    description: 'Es la falla en la relación objeto - entorno - sujeto. Esto implica el impacto de la luz solar (contraste), la escala respecto al peatón/conductor y la materialidad. Si el diseño no sobrevive al entorno, deja de comunicar. Tiene que ver con lo pragmático que estudiaron en DG2. Ejemplo: Los leds en el ingreso a la ciudad en el acceso este, en ciertos horarios algunos no solo son peligrosos sino que con el sol y el ruido visual no alcanzamos a leerlos.'
                },
                { 
                    subject: 'Fricción', 
                    painLabel: 'Cognitivo',
                    description: 'Mensajes que confunden o requieren demasiado esfuerzo mental. Ocurre cuando la pieza (el cartel, la señal, el envase) exige más recursos mentales de los que el usuario está dispuesto o puede asignar. Se puede producir a un nivel sintáctico, por exceso de información, falta de jerarquía o ruptura de convenciones visuales. O a un nivel semántico cuando el mensaje es ambiguo o carente de la información completa. Ejemplo: si la señalética en el MMAMM usara íconos tan abstractos que la gente no sabría hacia dónde caminar.'
                },
                { 
                    subject: 'Obsolescencia', 
                    painLabel: 'Identidad',
                    description: 'Uso de clichés obsoletos que ya no representan al sector, desactualización de los mensajes. Son los usos de signos que han perdido su "vínculo vivo" con la realidad. Se mantiene un cliché (el racimo de uvas y la hoja de parra ilustrada para el vino por ejemplo) por inercia cultural, ocultando la verdadera innovación del sector. Son fórmulas que se adoptan y tienen un gran “copy + paste”. Ejemplo: Una bodega que vende vino "Low-Alcohol" (tecnológico/moderno) pero usa una etiqueta clásica tipográfica con diagramación central, la figura de la bodega en stamping y recuadros bordeando la etiqueta.'
                },
                { 
                    subject: 'Coherencia', 
                    painLabel: 'Emocional',
                    description: 'Se refiere a la respuesta afectiva negativa que provoca una pieza. Un diseño frío o excluyente (que no contempla la diversidad) genera rechazo, miedo o sensación de abandono institucional. Ejemplo: Un formulario de hospital público que, por su tipografía y diagramación rígida, hace sentir al paciente como un número y no como una persona.'
                },
                { 
                    subject: 'Inclusividad', 
                    painLabel: 'Exclusión',
                    description: 'Ocurre cuando el diseño levanta una barrera invisible que impide a ciertos grupos el acceso al mensaje o al servicio. No es que el mensaje sea "feo" o "confuso", es que el usuario siente que "esto no es para mí". Ejemplo: Una señalética de un centro cultural en un edificio histórico que solo usa tipografías de contraste mínimo o tamaños pequeños, impidiendo que adultos mayores o personas con disminución visual puedan participar del evento.'
                },
            ];

            const glosario = [
                { title: '1. Sintonía con el contexto', desc: 'Alerta baja o nula: El mensaje se integra orgánicamente a Mendoza (luz, acequias, escala). Alerta / Red Flag: El mensaje es un parche molesto que agrede o ensucia el entorno.' },
                { title: '2. Fricción (Usuario-Mensaje)', desc: 'Alerta Baja o nula: La interacción fluye. El usuario obtiene lo que necesita sin detenerse. Alerta, Red flag: Hay un obstáculo real. El usuario se confunde, se choca o abandona la acción.' },
                { title: '3. Obsolescencia', desc: 'Alerta baja o nula: El diseño es vigente, responde al contexto actual y al 2026. Alerta o Red flag: El mensaje es un modo antiguo que ya pierde impacto comunicacional: códigos de otra época que ya no son funcionales.' },
                { title: '4. Coherencia total', desc: 'Alerta baja o nula: Intencionalidad. Lo que el diseñador quiso transmitir es lo que el usuario siente. Alerta o Red flag: Ruptura o Disonancia. El mensaje genera una emoción opuesta a la buscada (ej. miedo en lugar de seguridad).' },
                { title: '5. Inclusividad', desc: 'Alerta baja o nula: El mensaje abraza la diversidad y no deja a nadie afuera. (nadie que deba interpretar el mensaje). Alerta o Red flag: Exclusión alta. El mensaje ignora a ciertos grupos (por visión, edad, lenguaje o tecnología).' }
            ];

            const layerColors = ['#b01e23', '#831843', '#d97706', '#9d174d', '#7c2d12'];

            const handleMetadata = (key, value) => {
                setMetadata(prev => ({ ...prev, [key]: value }));
            };

            const addLayer = () => {
                if (layers.length < 5) {
                    setLayers([...layers, { 
                        id: Date.now(), 
                        name: `Registro 0${layers.length + 1}`, 
                        scores: [1, 1, 1, 1, 1],
                        visible: true,
                        color: layerColors[layers.length % layerColors.length]
                    }]);
                }
            };

            const removeLayer = (id) => {
                if (layers.length > 1) {
                    setLayers(layers.filter(l => l.id !== id));
                }
            };

            const updateScore = (layerId, varIndex, value) => {
                setLayers(layers.map(l => {
                    if (l.id === layerId) {
                        const newScores = [...l.scores];
                        newScores[varIndex] = parseInt(value);
                        return { ...l, scores: newScores };
                    }
                    return l;
                }));
            };

            const chartData = useMemo(() => {
                return variables.map((v, i) => {
                    const dataPoint = { subject: v.subject };
                    layers.forEach(layer => {
                        if(layer.visible) dataPoint[layer.name] = layer.scores[i];
                    });
                    return dataPoint;
                });
            }, [layers]);

            const predominanteIdx = useMemo(() => {
                const averages = variables.map((_, i) => 
                    layers.reduce((acc, curr) => acc + curr.scores[i], 0) / layers.length
                );
                const maxVal = Math.max(...averages);
                return maxVal === 1 ? -1 : averages.lastIndexOf(maxVal);
            }, [layers]);

            const puntoDeDolorCritico = predominanteIdx === -1 ? "Ninguno detectado" : variables[predominanteIdx].painLabel;
            const explicacionDolor = predominanteIdx === -1 ? "El sistema analizado presenta niveles óptimos de salud visual en todas sus dimensiones." : variables[predominanteIdx].description;

            const getSemaforoClass = (val) => {
                if (val === 1) return 'bg-verde-semaforo';
                if (val === 2) return 'bg-amarillo-semaforo';
                if (val === 3) return 'bg-rojo-semaforo';
                return '';
            };

            return (
                <div className="min-h-screen pb-12">
                    <nav className="no-print bg-[#b01e23] text-white px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-2xl">
                        <div className="flex items-center gap-3">
                            <div className="bg-white/20 p-2 rounded-lg backdrop-blur-md">
                                <Icon name="eye" className="text-white" />
                            </div>
                            <div>
                                <h2 className="font-black text-sm uppercase tracking-tighter leading-none">Arqueología Visual</h2>
                                <p className="text-[10px] text-white/70 font-bold uppercase tracking-widest leading-none mt-1">FAD UNCuyo</p>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-[1400px] mx-auto mt-8 px-6 grid grid-cols-1 lg:grid-cols-12 gap-8 print:block print:mt-0 print:px-0">
                        
                        <aside className="lg:col-span-4 space-y-6 no-print">
                            <section className="bg-white p-6 rounded-3xl shadow-sm border border-[#eeb8ac]">
                                <h3 className="font-black text-[#b01e23] text-[10px] uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <Icon name="settings" size={12} /> Configuración de Análisis
                                </h3>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Arqueólogo/a</label>
                                        <input 
                                            type="text" 
                                            className="w-full bg-[#fcf5f3] border-none rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-[#b01e23] transition-all"
                                            value={metadata.autor}
                                            onChange={(e) => handleMetadata('autor', e.target.value)}
                                        />
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Ámbito de Excavación</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {categorias.map(cat => (
                                                <button
                                                    key={cat.id}
                                                    onClick={() => handleMetadata('categoria', cat.id)}
                                                    className={`flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all ${metadata.categoria === cat.id ? 'border-[#b01e23] bg-[#fcf5f3]' : 'border-transparent bg-slate-50 opacity-60'}`}
                                                >
                                                    <Icon name={cat.icon} size={16} className={metadata.categoria === cat.id ? 'text-[#b01e23]' : 'text-slate-400'} />
                                                    <span className={`text-[10px] font-black uppercase tracking-tighter ${metadata.categoria === cat.id ? 'text-[#b01e23]' : 'text-slate-400'}`}>{cat.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-1 pt-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Zona de Intervención</label>
                                        <input 
                                            type="text" 
                                            placeholder="Ciudad / Barrio / Punto" 
                                            className="w-full bg-[#fcf5f3] border-none rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-[#b01e23] transition-all"
                                            value={metadata.zona}
                                            onChange={(e) => handleMetadata('zona', e.target.value)}
                                        />
                                    </div>
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-3xl shadow-sm border border-[#eeb8ac]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-[#b01e23] text-[10px] uppercase tracking-widest flex items-center gap-2">
                                        <Icon name="image" size={12} /> Imágenes de Registro
                                    </h3>
                                    <button 
                                        onClick={addLayer} 
                                        className="bg-[#b01e23] text-white p-1.5 rounded-lg hover:bg-[#831843] transition-all flex items-center justify-center"
                                    >
                                        <Icon name="plus" size={16} />
                                    </button>
                                </div>
                                
                                <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {layers.map((layer, lIdx) => (
                                        <div key={layer.id} className="p-4 rounded-2xl border border-slate-100 bg-[#fcf5f3]/50 hover:bg-white transition-all group">
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-3 h-3 rounded-full" style={{backgroundColor: layer.color}} />
                                                    <input 
                                                        className="bg-transparent font-black text-xs uppercase outline-none focus:text-[#b01e23]"
                                                        value={layer.name}
                                                        onChange={(e) => {
                                                            const n = [...layers]; n[lIdx].name = e.target.value; setLayers(n);
                                                        }}
                                                    />
                                                </div>
                                                <button onClick={() => removeLayer(layer.id)} className="text-slate-300 hover:text-[#b01e23] opacity-0 group-hover:opacity-100 transition-all">
                                                    <Icon name="trash-2" size={14} />
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-1 gap-2">
                                                {variables.map((v, vIdx) => (
                                                    <div key={v.subject} className="flex items-center justify-between">
                                                        <span className="text-[9px] font-bold text-slate-500 uppercase">{v.subject}</span>
                                                        <div className="flex bg-white rounded-lg p-0.5 border border-[#eeb8ac]">
                                                            {[1, 2, 3].map(val => (
                                                                <button 
                                                                    key={val}
                                                                    onClick={() => updateScore(layer.id, vIdx, val)}
                                                                    className={`w-6 h-6 text-[10px] font-black rounded-md transition-all ${layer.scores[vIdx] === val ? `${getSemaforoClass(val)} text-white shadow-sm` : 'text-slate-300 hover:text-[#eeb8ac]'}`}
                                                                >
                                                                    {val}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-3xl shadow-sm border border-[#eeb8ac] no-print">
                                <h3 className="font-black text-[#b01e23] text-[10px] uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <Icon name="book" size={12} /> Glosario de Patologías
                                </h3>
                                <div className="space-y-3">
                                    {glosario.map((item, idx) => (
                                        <div key={idx} className="bg-[#fcf5f3] p-3 rounded-2xl border border-[#eeb8ac]/30">
                                            <span className="text-[10px] font-black text-[#b01e23] uppercase block mb-1">{item.title}</span>
                                            <span className="text-[11px] font-medium text-slate-600 leading-tight block italic">{item.desc}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </aside>

                        <div className="lg:col-span-8 bg-white report-container rounded-[2.5rem] shadow-xl border border-[#eeb8ac] p-12 relative print:shadow-none print:border-black print:rounded-none overflow-hidden print:overflow-visible">
                            
                            <div className="flex justify-between items-start border-b-4 border-[#b01e23] pb-6 mb-6">
                                <div className="w-full">
                                    <div className="flex gap-2 items-center mb-4">
                                        <div className="bg-[#b01e23] text-white text-[9px] font-black px-2 py-1 inline-block rounded tracking-widest uppercase leading-none">Diagnóstico Arqueológico 2026</div>
                                        <div className="bg-slate-900 text-white text-[9px] font-black px-2 py-1 inline-block rounded tracking-widest uppercase leading-none">
                                            ÁMBITO {metadata.categoria}
                                        </div>
                                    </div>
                                    <h1 className="text-4xl font-black text-[#b01e23] tracking-tighter leading-none mb-2 uppercase">ARQUEOLOGÍA DE LO INVISIBLE</h1>
                                    <p className="text-[#831843] font-bold text-xs mono uppercase italic">Cátedra López Dupertuis | DGF - UNCuyo</p>
                                </div>
                            </div>

                            <div className="mb-6">
                                <div className="chart-container bg-[#fcf5f3] rounded-[2rem] border border-[#eeb8ac] p-6 h-[400px] w-full relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <RadarChart cx="50%" cy="50%" outerRadius="80%" data={chartData}>
                                            <PolarGrid stroke="#eeb8ac" strokeWidth={1} />
                                            <PolarAngleAxis dataKey="subject" tick={{ fill: '#b01e23', fontSize: 11, fontWeight: '900', textTransform: 'uppercase' }} />
                                            <PolarRadiusAxis domain={[0, 3]} tick={false} axisLine={false} />
                                            {layers.map((layer) => layer.visible && (
                                                <Radar 
                                                    key={layer.id} 
                                                    name={layer.name} 
                                                    dataKey={layer.name} 
                                                    stroke={layer.color} 
                                                    fill={layer.color} 
                                                    fillOpacity={0.12} 
                                                    strokeWidth={3}
                                                />
                                            ))}
                                            <Legend verticalAlign="bottom" align="center" wrapperStyle={{ paddingTop: '15px', fontSize: '9px', fontWeight: 'bold', textTransform: 'uppercase' }} />
                                        </RadarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="mb-8 space-y-4">
                                <div className="bg-[#b01e23] text-white px-8 py-3.5 rounded-[1.5rem] flex items-center justify-between shadow-lg">
                                    <div className="flex items-center gap-4">
                                        <Icon name="zap" className="text-[#f9d8cf]" size={20} />
                                        <h4 className="text-[10px] font-bold uppercase tracking-widest text-white/70">Punto de Dolor Predominante</h4>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="h-4 w-[1px] bg-white/20"></div>
                                        <p className="text-base font-black uppercase tracking-[0.15em] text-white">
                                            {puntoDeDolorCritico}
                                        </p>
                                    </div>
                                </div>

                                {/* BLOQUE PEDAGÓGICO NUEVO */}
                                <div className="pedagogic-box p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex items-start gap-3">
                                        <Icon name="info" className="text-[#b01e23] mt-1 shrink-0" size={18} />
                                        <div>
                                            <h5 className="text-[10px] font-black text-[#b01e23] uppercase tracking-widest mb-1">Nota Pedagógica de Excavación</h5>
                                            <p className="text-[13px] font-medium leading-relaxed text-slate-600">
                                                {explicacionDolor}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-8">
                                <AutoExpandingTextarea 
                                    label="1. Insight / Revelación"
                                    icon="search"
                                    placeholder="Un Insight o una revelación, no es lo que vemos, es lo que deducimos. Identificamos la falla-dolor más grave (física, cognitiva, emocional, de exclusión o de identidad). El insight nos dice por qué duele."
                                    value={metadata.insight}
                                    onChange={(val) => handleMetadata('insight', val)}
                                />

                                <AutoExpandingTextarea 
                                    label="2. Pregunta Generativa (HMW)"
                                    icon="help-circle"
                                    placeholder="Una pregunta generativa es una pregunta que no genera una respuesta cerrada sino que dispara para generar un espacio de posibilidad."
                                    value={metadata.hmw}
                                    onChange={(val) => handleMetadata('hmw', val)}
                                />

                                <AutoExpandingTextarea 
                                    label="3. Escenario Prospectivo (2050)"
                                    icon="map"
                                    placeholder="Imaginen que el presente es un punto de luz, un foco (donde está ilustrado el ojo). A medida que esa luz se proyecta hacia adelante en el tiempo, el haz se abre. Cuanto más lejos miramos, más espacio hay para la incertidumbre y la innovación."
                                    value={metadata.prospectiva}
                                    onChange={(val) => handleMetadata('prospectiva', val)}
                                /> 

                                <div className="no-print flex justify-end pt-4">
                                    <button 
                                        onClick={() => window.print()} 
                                        className="bg-[#b01e23] text-white hover:bg-[#831843] px-8 py-4 rounded-2xl text-xs font-black flex items-center gap-3 transition-all shadow-xl uppercase tracking-widest transform hover:scale-[1.02]"
                                    >
                                        <Icon name="printer" size={16} /> 
                                        Exportar Reporte
                                    </button>
                                </div>
                            </div>

                            <div className="mt-12 pt-6 border-t-2 border-[#eeb8ac] flex justify-between items-end">
                                <div>
