<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Arqueología Visual - FAD UNCuyo</title>
    
    <!-- 1. Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Dependencias Base -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- 3. Recharts (Requiere React y PropTypes arriba) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- 4. Otros -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { padding: 0; margin: 0; background: white; }
            .report-container { 
                width: 100%; 
                max-width: 100%;
                padding: 1.5cm;
                box-shadow: none !important;
                border: none !important;
            }
            textarea { border: none !important; resize: none; overflow: hidden; height: auto !important; }
        }
        .print-only { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Verificación de seguridad para Recharts
        const RechartsObj = window.Recharts;
        if (!RechartsObj) {
            console.error("Error: Recharts no se cargó correctamente.");
        }

        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, 
            ResponsiveContainer, Legend, Tooltip 
        } = RechartsObj;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [layers, setLayers] = useState([
                { id: 1, name: 'Registro A', scores: [2, 1, 3, 1, 1], visible: true, color: '#6366f1' },
                { id: 2, name: 'Registro B', scores: [1, 3, 2, 2, 1], visible: true, color: '#ec4899' },
            ]);
            const [insight, setInsight] = useState('');
            const [hmw, setHmw] = useState('');

            const variables = [
                { subject: 'Sintonía', description: 'Contexto Físico/Espacial' },
                { subject: 'Fricción', description: 'Cognitivo' },
                { subject: 'Obsolescencia', description: 'Identidad/Inercia' },
                { subject: 'Coherencia', description: 'Emocional' },
                { subject: 'Inclusividad', description: 'Exclusión' },
            ];

            const layerColors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#8b5cf6'];

            const addLayer = () => {
                if (layers.length < 5) {
                    setLayers([...layers, { 
                        id: Date.now(), 
                        name: `Registro ${String.fromCharCode(65 + layers.length)}`, 
                        scores: [1, 1, 1, 1, 1],
                        visible: true,
                        color: layerColors[layers.length]
                    }]);
                }
            };

            const removeLayer = (id) => {
                if (layers.length > 1) setLayers(layers.filter(l => l.id !== id));
            };

            const toggleVisibility = (id) => {
                setLayers(layers.map(l => l.id === id ? { ...l, visible: !l.visible } : l));
            };

            const updateScore = (layerId, varIndex, value) => {
                setLayers(layers.map(l => {
                    if (l.id === layerId) {
                        const newScores = [...l.scores];
                        newScores[varIndex] = parseInt(value);
                        return { ...l, scores: newScores };
                    }
                    return l;
                }));
            };

            const chartData = useMemo(() => {
                return variables.map((v, i) => {
                    const dataPoint = { subject: v.subject };
                    layers.forEach(layer => {
                        dataPoint[layer.name] = layer.scores[i];
                    });
                    const avg = layers.reduce((acc, curr) => acc + curr.scores[i], 0) / layers.length;
                    dataPoint.Promedio = parseFloat(avg.toFixed(2));
                    return dataPoint;
                });
            }, [layers]);

            const puntoDeDolorCritico = useMemo(() => {
                const averages = variables.map((_, i) => 
                    layers.reduce((acc, curr) => acc + curr.scores[i], 0) / layers.length
                );
                const maxVal = Math.max(...averages);
                const maxIdx = averages.indexOf(maxVal);
                if (maxVal <= 1.5) return "Nivel de alerta bajo/estable";
                return variables[maxIdx].description;
            }, [layers]);

            return (
                <div className="min-h-screen font-sans text-slate-900 print:bg-white">
                    <header className="max-w-7xl mx-auto p-8 no-print flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-3xl font-black text-indigo-950 tracking-tight">Arqueología Visual</h1>
                            <p className="text-slate-500 font-medium italic">FAD - UNCuyo | Diagnóstico de Patologías Visuales</p>
                        </div>
                        <div className="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex -space-x-2">
                                {layers.map((l) => (
                                    <div key={l.id} className="w-8 h-8 rounded-full border-2 border-white" style={{ backgroundColor: l.color }} />
                                ))}
                            </div>
                            <span className="text-xs font-bold text-slate-500 px-2 uppercase">{layers.length} / 5 CAPAS</span>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-8 pb-12 grid grid-cols-1 lg:grid-cols-12 gap-8 print:block">
                        <div className="lg:col-span-4 space-y-4 no-print">
                            <div className="flex justify-between items-center py-2">
                                <h2 className="font-black uppercase text-xs tracking-widest text-slate-400">Registros</h2>
                                <button onClick={addLayer} disabled={layers.length >= 5} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all">
                                    <Icon name="plus" size={14} /> Nueva Capa
                                </button>
                            </div>

                            <div className="space-y-4 overflow-y-auto max-h-[75vh] pr-2 custom-scrollbar">
                                {layers.map((layer, lIdx) => (
                                    <div key={layer.id} className={`bg-white p-4 rounded-2xl shadow-sm border-l-4 transition-all ${layer.visible ? 'opacity-100' : 'opacity-60 grayscale'}`} style={{ borderLeftColor: layer.color }}>
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => toggleVisibility(layer.id)} className="text-slate-400 hover:text-indigo-600">
                                                    <Icon name={layer.visible ? "eye" : "eye-off"} size={16} />
                                                </button>
                                                <input type="text" className="font-bold text-sm text-slate-700 bg-transparent border-none outline-none focus:ring-0 w-32" value={layer.name} onChange={(e) => {
                                                    const newLayers = [...layers];
                                                    newLayers[lIdx].name = e.target.value;
                                                    setLayers(newLayers);
                                                }} />
                                            </div>
                                            {layers.length > 1 && (
                                                <button onClick={() => removeLayer(layer.id)} className="text-slate-300 hover:text-red-500">
                                                    <Icon name="trash-2" size={14} />
                                                </button>
                                            )}
                                        </div>
                                        <div className="space-y-2">
                                            {variables.map((v, vIdx) => (
                                                <div key={v.subject} className="flex items-center justify-between gap-2">
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase">{v.subject}</span>
                                                    <div className="flex gap-1">
                                                        {[1, 2, 3].map((val) => (
                                                            <button key={val} onClick={() => updateScore(layer.id, vIdx, val)} className={`w-8 py-1 text-[10px] font-black rounded border transition-all ${layer.scores[vIdx] === val ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-slate-100 text-slate-200 hover:border-slate-300'}`}>
                                                                {val}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-8 space-y-6 report-container bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-slate-200 print:shadow-none print:border-none print:p-0">
                            <div className="print-only mb-12 border-b-2 border-slate-900 pb-6 flex justify-between items-end">
                                <div>
                                    <p className="text-xs font-black text-indigo-600 uppercase tracking-[0.3em] mb-2">Informe N°1</p>
                                    <h2 className="text-4xl font-black text-slate-900 uppercase leading-none">Arqueología de lo Invisible</h2>
                                    <p className="text-sm font-medium text-slate-500 mt-2">DGF - FAD - UNCuyo</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-bold text-slate-400">FECHA: {new Date().toLocaleDateString()}</p>
                                    <p className="text-xs font-bold text-slate-400">CÁTEDRA: LÓPEZ DUPERTUIS</p>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row justify-between items-start mb-8 gap-4">
                                <div>
                                    <h3 className="font-black text-slate-900 text-2xl uppercase tracking-tight">Mapeo de Patologías</h3>
                                    <p className="text-sm text-slate-400 italic">Análisis sistémico de registros de campo.</p>
                                </div>
                                <div className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-center">
                                    <span className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Hallazgo Principal</span>
                                    <span className="text-base font-black uppercase">{puntoDeDolorCritico}</span>
                                </div>
                            </div>

                            <div className="w-full h-[400px] mb-8 bg-slate-50 rounded-3xl p-4 print:bg-white">
                                <ResponsiveContainer width="100%" height="100%">
                                    <RadarChart cx="50%" cy="50%" outerRadius="80%" data={chartData}>
                                        <PolarGrid stroke="#cbd5e1" />
                                        <PolarAngleAxis dataKey="subject" tick={{ fill: '#475569', fontSize: 12, fontWeight: '900' }} />
                                        <PolarRadiusAxis domain={[0, 3]} tick={false} axisLine={false} />
                                        {layers.map((layer) => layer.visible && (
                                            <Radar key={layer.id} name={layer.name} dataKey={layer.name} stroke={layer.color} fill={layer.color} fillOpacity={0.05} strokeWidth={2} dot={{ r: 3 }} />
                                        ))}
                                        <Radar name="PROMEDIO" dataKey="Promedio" stroke="#000" fill="transparent" strokeWidth={3} strokeDasharray="5 5" />
                                        <Legend />
                                    </RadarChart>
                                </ResponsiveContainer>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <h4 className="text-xs font-black text-amber-600 uppercase mb-3 border-b border-amber-100 pb-2">El Insight</h4>
                                    <textarea className="w-full p-4 h-32 rounded-2xl bg-amber-50/30 border-2 border-amber-100 text-sm outline-none print:p-0 print:bg-transparent print:border-none" placeholder="Revelación del sistema..." value={insight} onChange={(e) => setInsight(e.target.value)} />
                                </div>
                                <div>
                                    <h4 className="text-xs font-black text-emerald-600 uppercase mb-3 border-b border-emerald-100 pb-2">Pregunta HMW</h4>
                                    <textarea className="w-full p-4 h-32 rounded-2xl bg-emerald-50/30 border-2 border-emerald-100 text-sm outline-none print:p-0 print:bg-transparent print:border-none" placeholder="¿Cómo podríamos...?" value={hmw} onChange={(e) => setHmw(e.target.value)} />
                                </div>
                            </div>

                            <div className="print-only mt-12 pt-8 border-t border-slate-100">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Equipo de Investigación</h4>
                                <div className="grid grid-cols-3 gap-8">
                                    {[1, 2, 3, 4, 5, 6].map(i => (
                                        <div key={i} className="border-b border-slate-200 pb-2 text-[10px] text-slate-300">Integrante {i}</div>
                                    ))}
                                </div>
                            </div>

                            <button onClick={() => window.print()} className="w-full mt-10 no-print bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all">
                                <Icon name="printer" size={20} /> IMPRIMIR REPORTE A4
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
